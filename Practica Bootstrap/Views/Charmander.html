<!-- CONTENIDO -->
<div class="container main-container text-center">

    <h1 class="mb-4">Charmander 🔥</h1>

    <!-- CARRUSEL -->
    <div id="carouselCharmander" class="carousel slide w-50 mx-auto" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/004.png" class="d-block w-100">
            </div>

            <div class="carousel-item">
                <img src="https://img.pokemondb.net/sprites/home/shiny/charmander.png" class="d-block w-100">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselCharmander" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselCharmander" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    <br>

    <!-- BOTONES -->
    <button class="btn btn-danger" onclick="alert('Charmander elegido!')">Elegir</button>

    <!-- BOTON MODAL -->
    <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#modalCharmander">
        Ver información rápida
    </button>

    <br><br>

    <!-- ACCORDION -->
    <div class="accordion w-75 mx-auto" id="accordionCharmander">

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#info1">
                    Tipo
                </button>
            </h2>
            <div id="info1" class="accordion-collapse collapse show" data-bs-parent="#accordionCharmander">
                <div class="accordion-body">
                    Tipo Fuego 🔥
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#info2">
                    Descripción
                </button>
            </h2>
            <div id="info2" class="accordion-collapse collapse" data-bs-parent="#accordionCharmander">
                <div class="accordion-body">
                    La llama en su cola indica su estado emocional. Si está débil, la llama arde más suavemente.
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#info3">
                    Habilidades
                </button>
            </h2>
            <div id="info3" class="accordion-collapse collapse" data-bs-parent="#accordionCharmander">
                <div class="accordion-body">
                    Mar Llamas, Poder Solar
                </div>
            </div>
        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalCharmander" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Charmander</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/004.png" class="img-fluid mb-3" style="max-height:200px;">
                
                <p><strong>Tipo:</strong> Fuego 🔥</p>
                <p><strong>Altura:</strong> 0.6 m</p>
                <p><strong>Peso:</strong> 8.5 kg</p>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>

        </div>
    </div>
</div>
